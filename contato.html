<body>
    <div>
        <img src="imgs/Logo.jpg" alt=""> 
    </div>

    <h1>Mande uma mensagem</h1>

    <form action="">
        <ul>
            <li>
                <label for="name">Nome</label>
                <input type="text" id="name" name="name">
            </li>
            <li>
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email">
            </li>
            <li>
                <label for="phone">Telefone</label>
                <input type="tel" id="phone" name="phone" placeholder="(99) 99999-9999">
            </li>
            <li>
                <label for="assunto">Assunto</label>
                <select name="assunto" id="assunto" required>
                    <option value="">-- Selecione --</option>
                    <option value="reclamacao">Reclamação</option>
                    <option value="sugestao">Sugestão</option>
                </select>
            </li>
            <li>
                <label for="message">Mensagem</label>
                <textarea id="message" name="message"></textarea>
            </li>
            <li>
                <fieldset>
                    <legend>Opções de Resposta</legend>
                    <input type="checkbox" id="email_resp" name="opc_resp" value="email">
                    <label for="email_resp">E-mail</label>
                    <input type="checkbox" id="phone_resp" name="opc_resp" value="phone">
                    <label for="phone_resp">Telefone</label>
                </fieldset>
            </li>
            <li>
                <button type="submit">Enviar</button>
            </li>
        </ul>
    </form>
