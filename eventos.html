<body>

    
    <div>
        <img src="imgs/Logo.jpg" alt=""> 
    </div>

    <h1>Inscreva-se</h1>
    
    <div>
        <form method="post" action="">
            <fieldset>
                <label for="eventos">Eventos</label>
                <select name="eventos" id="eventos">
                    <option value="">-- Selecione --</option>
                    <option value="voe">Voe sem asas</option>
                    <option value="jun">Festa junina</option>
                    <option value="inf">Semana de tecnologia</option>
                </select>
            </fieldset>
    
            <fieldset>
                <legend>Informações de Acesso</legend><br>
                <label for="user">Usuário:</label>
                <input type="text" id="user" name="user" required><br><br>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required><br><br>

                <label for="passwordcheck">Confirmar Senha:</label>
                <input type="password" id="passwordcheck" name="passwordcheck" required><br><br>
            </fieldset>
        
            <fieldset>
                <legend>Informações Pessoais</legend><br>
                <label for="name">Nome Completo:</label>
                <input type="text" id="name" name="name"><br><br>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email"><br><br>

                <label for="phone">Telefone:</label>
                <input type="tel" id="phone" name="phone" placeholder="(99) 99999-9999" pattern="^(\+55\s?)?\([1-9][0-9]\)\s?(?:9\d{4}[-\s]?\d{4}|\d{4}[-\s]?\d{4})$" title="Formato: (99) 99999-9999 ou (99) 9999-9999. +55 opcional"><br><br>

                <fieldset>
                    <legend>Sexo</legend>
                    <input type="radio" id="masculino" name="sexo" value="masculino">
                    <label for="masculino">Masculino</label>
                    <input type="radio" id="feminino" name="sexo" value="feminino">
                    <label for="feminino">Feminino</label>
                </fieldset><br>

                <label for="data_nasc">Data de Nascimento</label>
                <input type="date" id="data_nasc" name="data_nasc"><br><br>

                <label for="corfav">Cor Favorita</label>
                <input type="color" id="corfav" name="corfav"><br><br>

                <label for="perfilgit">Perfil no GitHub</label>
                <input type="url" id="perfilgit" name="perfilgit" placeholder="https://github.com/username"><br><br>
            </fieldset><br>
        
            <button type="submit">Inscrever</button>
            <button type="reset">Limpar</button>
        </form>
    </div>
